run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  go: "1.25"

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused

issues:
  exclude-dirs:
    - vendor
  exclude-rules:
    - path: "opt/homebrew/Cellar/go"
      linters:
        - typecheck
