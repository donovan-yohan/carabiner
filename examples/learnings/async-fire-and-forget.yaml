pattern: "Async fire-and-forget discards errors from promises/goroutines"
recommendation: "Every async operation (Promise, goroutine, Task) must have its error handled. Use Promise.catch(), errgroup, or structured concurrency. Unhandled rejections and panicking goroutines crash production silently."
